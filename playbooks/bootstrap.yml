---
- name: Bootstrap AI lab nodes
  hosts: ai_lab
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
          - build-essential
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - net-tools
          - jq
        state: present

    - name: Create AI workspace directory
      ansible.builtin.file:
        path: /opt/ai-lab
        state: directory
        owner: "{{ ansible_user | default('andrew') }}"
        group: "{{ ansible_user | default('andrew') }}"
        mode: "0755"

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv /opt/ai-lab/.venv
        creates: /opt/ai-lab/.venv/bin/python

    - name: Upgrade pip tooling
      ansible.builtin.pip:
        name:
          - pip
          - wheel
          - setuptools
        state: latest
        virtualenv: /opt/ai-lab/.venv

    - name: Install Python AI starter packages
      ansible.builtin.pip:
        name:
          - jupyterlab
          - numpy
          - pandas
          - matplotlib
          - requests
          - transformers
          - sentence-transformers
          - accelerate
          - torch
        virtualenv: /opt/ai-lab/.venv
